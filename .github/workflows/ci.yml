name: CI

on:
  push:
    branches: [main, master, work]
  pull_request:
    branches: [main, master, work]

env:
  NODE_VERSION: "20"

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run TRIP security scanner
        run: python .agent/skills/vulnerability-scanner/scripts/security_scan.py . --output summary

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TRIP_DATA_PROVIDER: memory
      TRIP_STRICT_DATA_PROVIDER: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Run backend unit tests
        run: npm test -- --testPathIgnorePatterns=e2e --forceExit

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Vite production build
        run: npm run build

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [security-scan, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t trip-backend:ci ./backend
      - name: Verify backend healthcheck script
        run: |
          docker run --rm -d --name trip-backend-ci \
            -e NODE_ENV=test \
            -e TRIP_DATA_PROVIDER=memory \
            -e TRIP_STRICT_DATA_PROVIDER=false \
            -p 5099:5000 \
            trip-backend:ci sh -c "npm start"
          sleep 8
          curl -sf http://localhost:5099/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status']); sys.exit(0 if d['status'] in ('OK','DEGRADED') else 1)"
          docker stop trip-backend-ci
